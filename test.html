<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字接力·旋转传递战 Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        
        svg {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
        }
        
        #message {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h3>数字接力·旋转传递战 Demo</h3>
    <button onclick="startDemo()">开始演示</button>

    <svg id="field" viewBox="0 0 900 400" preserveAspectRatio="xMidYMid meet">
    <g id="groupA"></g>
    <g id="groupB"></g>
    <circle id="runner" cx="0" cy="0" r="15" fill="red" visibility="hidden"/>
    <!-- 裁判球 -->
    <circle id="judge" cx="450" cy="300" r="20" fill="#8A2BE2"/>
    <text x="450" y="305" text-anchor="middle" font-size="12" fill="white">裁判</text>
  </svg>

    <div id="message"></div>

    <script>
        const groupA = document.getElementById("groupA");
        const groupB = document.getElementById("groupB");
        const runner = document.getElementById("runner");
        const message = document.getElementById("message");

        let A = [],
            B = [];

        function renderGroups() {
            groupA.innerHTML = "";
            groupB.innerHTML = "";
            // A组：从右到左
            for (let i = 0; i < A.length; i++) {
                let x = 250 - i * 70;
                groupA.innerHTML += `<circle cx="${x}" cy="100" r="15" fill="#87CEEB"/><text x="${x}" y="105" text-anchor="middle" font-size="12">${A[i].label}</text>`;
                A[i].x = x;
                A[i].y = 100;
            }
            // B组：从左到右
            for (let i = 0; i < B.length; i++) {
                let x = 650 + i * 70;
                groupB.innerHTML += `<circle cx="${x}" cy="100" r="15" fill="#FFD700"/><text x="${x}" y="105" text-anchor="middle" font-size="12">${B[i].label}</text>`;
                B[i].x = x;
                B[i].y = 100;
            }
        }

        function initGroups() {
            A = [];
            B = [];
            for (let i = 0; i < 4; i++) A.push({
                label: `A${i+1}`
            });
            for (let i = 0; i < 4; i++) B.push({
                label: `B${i+1}`
            });
            renderGroups();
        }

        async function moveRunner(x1, y1, x2, y2, label) {
            runner.setAttribute("cx", x1);
            runner.setAttribute("cy", y1);
            runner.setAttribute("visibility", "visible");
            let steps = 20;
            for (let i = 1; i <= steps; i++) {
                let nx = x1 + (x2 - x1) * i / steps;
                let ny = y1 + (y2 - y1) * i / steps;
                runner.setAttribute("cx", nx);
                runner.setAttribute("cy", ny);
                await new Promise(r => setTimeout(r, 80));
            }
            message.innerText = `${label} 完成传递`;
        }

        async function startDemo() {
            initGroups();
            // 演示几轮
            for (let round = 0; round < 2; round++) {
                // A组传递
                let from = A.shift();
                let to = B[0];
                await moveRunner(from.x, from.y, to.x, to.y, from.label + "→" + to.label);
                B.push(from);
                renderGroups();

                // B组传递
                let fromB = B.shift();
                let toA = A[0];
                await moveRunner(fromB.x, fromB.y, toA.x, toA.y, fromB.label + "→" + toA.label);
                A.push(fromB);
                renderGroups();
            }

            // 最后阶段：严格分解
            // Step1: A4 -> B4
            let fromA = A.shift();
            let toB = B[0];
            await moveRunner(fromA.x, fromA.y, toB.x, toB.y, fromA.label + "→" + toB.label);
            B.push(fromA);
            renderGroups(); // 更新一次动画

            // Step2: B4 -> 裁判
            let lastB = B.pop();
            await moveRunner(lastB.x, lastB.y, 450, 300, lastB.label + "→裁判");
            renderGroups(); // 更新一次动画

            // Step3: B4归队到A组队尾
            A.push(lastB);
            renderGroups(); // 再更新一次动画

            message.innerText = "演示完成：最后传递到裁判并归队";
        }

        initGroups();
    </script>
</body>

</html>
